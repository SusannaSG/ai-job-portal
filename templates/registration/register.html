{% extends 'base.html' %}

{% block title %}Register — AI Job Portal{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">📝 Register</h2>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg"
                            placeholder="Choose a username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg"
                            placeholder="Enter your email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password1" class="form-control form-control-lg"
                            placeholder="Choose a password" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Confirm Password</label>
                        <input type="password" name="password2" class="form-control form-control-lg"
                            placeholder="Repeat your password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                    </div>
                </form>

                <hr>

                <p class="text-center text-muted">
                    Already have an account?
                    <a href="/accounts/login/">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
